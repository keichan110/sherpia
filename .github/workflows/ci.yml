name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: pnpm/action-setup@v4
        with:
          version: 11.4.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Biome check (auto-fix)
        run: pnpm biome check --write --error-on-warnings .

      - name: Commit Biome fixes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Apply Biome auto-fixes"

      - run: pnpm typecheck

      - run: pnpm build
